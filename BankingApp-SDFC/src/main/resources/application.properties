spring.application.name=BankingApp-SDFC


# Local: 8080
# Render: uses PORT automatically
server.port=${PORT:8080}


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:bankdata}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC


spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Pradip@2001}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true




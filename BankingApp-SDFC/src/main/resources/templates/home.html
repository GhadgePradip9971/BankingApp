
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<title>SDFC BANK · Home</title>
<!-- favicon -->
<link rel="icon" th:href="@{/images/bank.png}" type="image/png">

</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div th:replace="~{fragments/navbar :: navbar}"></div>

		<div class="banner-card">

			<!-- golden banner image (gold.png) -->
			<img th:src="@{/images/gold.png}" alt="Banking gold banner">

			<div class="banner-text">

				</p>

				<div class="badge">✦ 24/7 online banking</div>

		</div>
	</main>


<div th:replace="~{fragments/footer :: footer}"></div>
